<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>QUANTUM SWARM: ETERNAL DYNASTY</title>
<style>
  :root{
    --bg:#000000;
    --text:#ffffff;
    --gold:#ffea00;
    --cyan:#00ffff;
    --magenta:#ff00ff;
    --lime:#b8ff00;
    --orange:#ff9b00;
    --red:#ff445e;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at 50% 50%, #150025 0%, #030308 45%, #000000 100%);font-family:'Orbitron',sans-serif;color:var(--text);touch-action:none;overscroll-behavior:none;-webkit-text-size-adjust:100%;}
  #app{position:fixed;inset:0;overflow:hidden;touch-action:none;}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;filter:contrast(1.18) saturate(1.45) brightness(1.03);}
  .hud{position:absolute;left:12px;right:12px;top:calc(12px + env(safe-area-inset-top));display:flex;justify-content:space-between;gap:10px;pointer-events:none;z-index:5;}
  .card{min-width:0;flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-left:4px solid var(--cyan);backdrop-filter:blur(18px);padding:10px 14px;box-shadow:0 0 28px rgba(0,255,255,0.16);border-radius:16px;}
  .label{font-size:11px;letter-spacing:.22em;color:var(--cyan);font-weight:700;opacity:.95;}
  .value{font-size:clamp(20px,5vw,32px);font-weight:900;text-shadow:0 0 15px var(--cyan);line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sub{font-size:11px;letter-spacing:.14em;color:rgba(255,255,255,.72);margin-top:4px;}
  .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.78);backdrop-filter:blur(10px);z-index:100;padding:24px;}
  .panel{text-align:center;max-width:620px;width:min(92vw,620px);border:2px solid var(--cyan);border-radius:24px;padding:34px 22px;box-shadow:0 0 100px rgba(0,255,255,0.25), inset 0 0 30px rgba(255,255,255,0.04);background:linear-gradient(180deg, rgba(0,255,255,0.08), rgba(255,0,255,0.06));}
  h1{font-size:clamp(2.2rem,10vw,4rem);margin:0;letter-spacing:6px;text-shadow:0 0 30px var(--cyan);line-height:1.05;}
  .lead{letter-spacing:1.2px;margin:16px 0 0;color:rgba(255,255,255,.84);font-size:14px;line-height:1.7;}
  button{background:linear-gradient(90deg,var(--cyan),#9bf7ff);border:none;padding:16px 42px;font-size:22px;font-weight:900;cursor:pointer;margin-top:26px;border-radius:999px;box-shadow:0 0 30px rgba(0,255,255,.65);transition:transform .15s ease, filter .15s ease;}
  button:active{transform:scale(.98)}
  .fever-ui{position:absolute;bottom:calc(18px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);width:min(86vw,760px);height:14px;background:rgba(255,255,255,0.1);border-radius:999px;overflow:hidden;box-shadow:0 0 24px rgba(255,0,255,.25);z-index:4;}
  #energyBar{height:100%;width:0%;background:linear-gradient(90deg, var(--cyan), var(--magenta), var(--gold));box-shadow:0 0 20px var(--magenta);}
  .hint{position:absolute;left:50%;bottom:calc(42px + env(safe-area-inset-bottom));transform:translateX(-50%);font-size:12px;letter-spacing:.1em;color:rgba(255,255,255,.78);background:rgba(0,0,0,.34);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:8px 14px;backdrop-filter:blur(10px);z-index:4;pointer-events:none;white-space:nowrap;}
  .toast{position:absolute;left:50%;top:22%;transform:translateX(-50%);font-weight:900;font-size:clamp(20px,5vw,40px);letter-spacing:.16em;text-shadow:0 0 18px currentColor, 0 0 35px currentColor;pointer-events:none;opacity:0;z-index:6;}
  .color-badge{position:absolute;right:12px;bottom:calc(72px + env(safe-area-inset-bottom));padding:10px 14px;border-radius:999px;font-size:12px;letter-spacing:.15em;font-weight:900;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(12px);z-index:4;pointer-events:none;}
  .badge-blue{color:var(--cyan);box-shadow:0 0 20px rgba(0,255,255,.25)}
  .badge-pink{color:var(--magenta);box-shadow:0 0 20px rgba(255,0,255,.25)}
  .color-controls{position:absolute;left:12px;right:12px;bottom:calc(74px + env(safe-area-inset-bottom));display:flex;justify-content:space-between;gap:14px;z-index:7;pointer-events:none;}
  .color-btn{pointer-events:auto;flex:1;max-width:180px;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.42);backdrop-filter:blur(12px);border-radius:20px;padding:14px 12px;font:900 16px/1 Orbitron,sans-serif;letter-spacing:.08em;color:#fff;box-shadow:0 0 18px rgba(255,255,255,.08);touch-action:none;}
  .color-btn.blue{color:var(--cyan);box-shadow:0 0 20px rgba(0,255,255,.22);}
  .color-btn.pink{color:var(--magenta);box-shadow:0 0 20px rgba(255,0,255,.22);}
  .color-btn.active{transform:scale(.98);filter:brightness(1.18);border-color:rgba(255,255,255,.42);}
  .color-btn:active{transform:scale(.96);}
</style>
</head>
<body>
<div id="app">
  <canvas id="cv"></canvas>
  <div class="hud">
    <div class="card"><div class="label">SCORE</div><div class="value" id="score">0</div><div class="sub" id="waveText">WAVE 1</div></div>
    <div class="card"><div class="label">COMBO</div><div class="value" id="combo">0</div><div class="sub" id="feverText">FEVER 0%</div></div>
  </div>
  <div class="toast" id="toast"></div>
  <div class="color-badge badge-blue" id="colorBadge">いまの色 青</div>
  <div class="color-controls">
    <button class="color-btn blue active" id="blueBtn" type="button">青</button>
    <button class="color-btn pink" id="pinkBtn" type="button">ピンク</button>
  </div>
  <div class="hint" id="hint">長押しで撃つ　下の青とピンクで色チェンジ　ダブルタップでドカン　弾は撃ち消せる</div>
  <div class="fever-ui"><div id="energyBar"></div></div>
  <div class="overlay" id="titleScreen">
    <div class="panel">
      <h1 id="mainTitle">QUANTUM<br>SWARM</h1>
      <p id="subTitle" style="letter-spacing:2px;margin:18px 0 0;">ETERNAL DYNASTY EDITION</p>
      <p class="lead" id="leadText">上から来る敵を、下の砲台でぶち抜くだけ。<br>長押しで撃つ。青い敵は青、ピンクの敵はピンク。<br>ダブルタップで、まとめてドカン。ボス弾は同じ色で撃ち消せる。</p>
      <button id="startBtn">ENGAGE</button>
    </div>
  </div>
</div>

<script>

(() => {
  const canvas = document.getElementById('cv');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const comboEl = document.getElementById('combo');
  const waveText = document.getElementById('waveText');
  const feverText = document.getElementById('feverText');
  const energyBar = document.getElementById('energyBar');
  const titleScreen = document.getElementById('titleScreen');
  const startBtn = document.getElementById('startBtn');
  const mainTitle = document.getElementById('mainTitle');
  const subTitle = document.getElementById('subTitle');
  const leadText = document.getElementById('leadText');
  const toastEl = document.getElementById('toast');
  const hintEl = document.getElementById('hint');
  const colorBadge = document.getElementById('colorBadge');
  const blueBtn = document.getElementById('blueBtn');
  const pinkBtn = document.getElementById('pinkBtn');

  const COLORS = ['#00ffff', '#ff00ff'];
  const COLOR_NAMES = ['青', 'ピンク'];
  const MAX_ENERGY = 100;
  const LANES = 5;
  const BOSS_WAVES = true;
  const BOSS_TYPES = ['SPREADER','LASER','SWARM_QUEEN','BOUNCER','PHASE_SHIFT'];
  const PRAISE_POOL = ['good！','super','nice','！','Amazing!','Brilliant','Genius','Flawless','Slay','Stunning'];
  const RANK_TABLE = [
    [0, 'D'],
    [5, 'C'],
    [15, 'B'],
    [30, 'A'],
    [60, 'S'],
    [100, 'SS'],
  ];

  function safeGetLocal(key, fallback = '') {
    try {
      const v = window.localStorage.getItem(key);
      return v == null ? fallback : v;
    } catch (_) {
      return fallback;
    }
  }

  function safeSetLocal(key, value) {
    try {
      window.localStorage.setItem(key, value);
      return true;
    } catch (_) {
      return false;
    }
  }

  let highScore = parseInt(safeGetLocal('qs_hi', '0') || '0', 10);
  if (!Number.isFinite(highScore)) highScore = 0;
  let audioCtx = null;
  let audioNodeCount = 0;
  const AUDIO_NODE_LIMIT = 12;
  let w = 0, h = 0, dpr = Math.max(1, window.devicePixelRatio || 1);

  function saveHighScore() {
    if (game.score > highScore) {
      highScore = game.score;
      safeSetLocal('qs_hi', String(highScore));
      if (!game.newRecordShown) {
        game.newRecord = true;
        game.newRecordShown = true;
        game.newRecordFreeze = 0.8;
        game.newRecordFlash = 1;
        game.flash = Math.max(game.flash, 0.45);
        game.flashColor = '#ffffff';
        game.shock = Math.max(game.shock, 12);
        showToast('NEW RECORD', '#ffffff');
        playSound(640, 'triangle', 0.14, 0.06, 0.9);
        setTimeout(() => playSound(980, 'square', 0.24, 0.05, 0.8), 80);
      }
    }
  }

  function calcRank(combo) {
    let r = 'D';
    for (const [th, name] of RANK_TABLE) if (combo >= th) r = name;
    return r;
  }

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playSound(freq, type = 'sine', dur = 0.1, vol = 0.1, sweep = 0.6) {
    if (audioNodeCount >= AUDIO_NODE_LIMIT) return;
    const ac = getAudioCtx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(Math.max(50, freq), ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(Math.max(18, freq * sweep), ac.currentTime + dur);
    gain.gain.setValueAtTime(vol, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
    osc.connect(gain);
    gain.connect(ac.destination);
    audioNodeCount++;
    osc.onended = () => { audioNodeCount = Math.max(0, audioNodeCount - 1); };
    osc.start();
    osc.stop(ac.currentTime + dur);
  }

  function playKillSound(isBoss, isGiant, combo) {
    const boost = Math.min(combo * 12, 320);
    if (isBoss) {
      playSound(180 + boost * 0.25, 'sawtooth', 0.18, 0.08, 0.35);
      playSound(420 + boost * 0.6, 'triangle', 0.12, 0.05, 0.75);
      return;
    }
    if (isGiant) {
      playSound(240 + boost, 'square', 0.18, 0.06, 0.42);
      playSound(120 + boost * 0.5, 'sawtooth', 0.14, 0.04, 0.35);
    } else {
      playSound(620 + boost, 'sine', 0.08, 0.05, 0.72);
      if (combo >= 10) playSound((620 + boost) * 1.45, 'triangle', 0.06, 0.025, 0.86);
    }
  }

  function playFeverSound() {
    [160, 220, 320, 480, 720].forEach((f, i) => {
      setTimeout(() => playSound(f, 'sawtooth', 0.18, 0.045, 0.55), i * 36);
    });
    setTimeout(() => playSound(980, 'square', 0.3, 0.05, 0.85), 180);
  }

  function roundRectPath(c, x, y, width, height, radius) {
    const r = Math.min(radius, width / 2, height / 2);
    c.beginPath();
    c.moveTo(x + r, y);
    c.arcTo(x + width, y, x + width, y + height, r);
    c.arcTo(x + width, y + height, x, y + height, r);
    c.arcTo(x, y + height, x, y, r);
    c.arcTo(x, y, x + width, y, r);
    c.closePath();
  }

  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  function resize() {
    dpr = Math.max(1, window.devicePixelRatio || 1);
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    if (game) updateBasePosition();
  }
  window.addEventListener('resize', resize);
  window.visualViewport?.addEventListener('resize', resize);
  window.visualViewport?.addEventListener('scroll', resize);

  let game = null;

  function makeGame() {
    return {
      state: 'title',
      score: 0,
      combo: 0,
      energy: 0,
      wave: 1,
      lives: 3,
      phase: 0,
      shock: 0,
      flash: 0,
      flashColor: '#ffffff',
      toast: 0,
      toastColor: '#ffffff',
      enemies: [],
      enemyBullets: [],
      bullets: [],
      particles: [],
      lightBursts: [],
      stars: [],
      hitStopTimer: 0,
      zoomPunch: 0,
      screenZoom: 1,
      feverFlash: 0,
      feverActivated: false,
      pAngle: -Math.PI / 2,
      pointerDown: false,
      holdDelay: 0.07,
      holdArmed: false,
      autoFire: 0,
      fireInterval: 0.082,
      pulseCooldown: 0,
      comboTimer: 0,
      time: 0,
      centerRadius: 54,
      recoil: 0,
      baseX: 0,
      baseY: 0,
      activePointerId: null,
      fireTouchId: null,
      fireTouchActive: false,
      lastTapAt: 0,
      rank: 'D',
      rankTimer: 0,
      vignette: 0,
      praiseTimer: 4.5,
      boss: null,
      bossWarning: 0,
      bossPhase: 0,
      bossType: '',
      waveEnemiesLeft: 12,
      waveBossCleared: false,
      newRecord: false,
      newRecordShown: false,
      newRecordFreeze: 0,
      newRecordFlash: 0,
      spawnTimer: 1.0,
      lockedTargetId: null,
      lockTimer: 0,
    };
  }

  function initStars() {
    game.stars = [];
    for (let i = 0; i < 80; i++) {
      game.stars.push({ x: Math.random() * w, y: Math.random() * h, z: Math.random() + 0.2, r: Math.random() * 2 + 0.5 });
    }
  }

  function getViewportOffset() {
    return window.visualViewport ? Math.max(0, window.innerHeight - window.visualViewport.height) : 0;
  }

  function updateBasePosition() {
    const vv = getViewportOffset();
    game.baseX = w / 2;
    game.baseY = h - 108 - vv;
    game.centerRadius = 54;
  }

  function laneX(i) {
    const margin = Math.max(42, w * 0.08);
    const usable = w - margin * 2;
    const step = usable / (LANES - 1);
    return margin + step * i;
  }

  function resetGame() {
    game = makeGame();
    game.state = 'play';
    updateBasePosition();
    initStars();
    updatePhaseText();
    updateHud();
    mainTitle.innerHTML = 'QUANTUM<br>SWARM';
    subTitle.textContent = `BEST ${highScore.toLocaleString()}`;
    leadText.innerHTML = '長押しで撃つ。下の青とピンクで色チェンジ。ダブルタップでドカン。<br>波を抜け、ボスを倒し、記録を更新する。';
    startBtn.textContent = 'ENGAGE';
    titleScreen.style.display = 'none';
  }

  function updatePhaseText() {
    colorBadge.textContent = `いまの色 ${COLOR_NAMES[game.phase]}`;
    colorBadge.className = `color-badge ${game.phase === 0 ? 'badge-blue' : 'badge-pink'}`;
    hintEl.textContent = game.phase === 0
      ? '長押しで撃つ　青い敵を撃て　下のピンクで切り替え　ダブルタップでドカン'
      : '長押しで撃つ　ピンクの敵を撃て　下の青で切り替え　ダブルタップでドカン';
    blueBtn.classList.toggle('active', game.phase === 0);
    pinkBtn.classList.toggle('active', game.phase === 1);
  }

  function setPhase(phase) {
    if (game.state !== 'play') return false;
    if (game.phase === phase) return false;
    game.phase = phase;
    updatePhaseText();
    game.flash = Math.max(game.flash, 0.18);
    game.flashColor = COLORS[game.phase];
    playSound(game.phase === 0 ? 740 : 520, 'triangle', 0.11, 0.05, 0.8);
    return true;
  }

  function showToast(text, color = '#fff') {
    toastEl.textContent = text;
    toastEl.style.color = color;
    game.toast = 1;
    game.toastColor = color;
  }

  function spawnLightBurst(x, y, color, count = 6) {
    for (let i = 0; i < count; i++) {
      const ang = Math.random() * Math.PI * 2;
      game.lightBursts.push({
        x, y, angle: ang, len: 0, maxLen: Math.max(w, h) * (0.6 + Math.random() * 0.6),
        speed: 2200 + Math.random() * 800, color, width: 1.5 + Math.random() * 3, life: 1
      });
    }
  }

  function spawnExplosion(x, y, color, count = 24, power = 1) {
    const amount = Math.min(20, Math.round(count * 0.35 + power * 3));
    for (let i = 0; i < amount; i++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = (Math.random() * 5 + 1.5) * power;
      game.particles.push({
        x, y,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd,
        life: 1,
        color,
        size: Math.random() * 7 + 3,
        spin: (Math.random() - 0.5) * 0.4,
        rot: Math.random() * Math.PI * 2,
        friction: 0.93
      });
    }
    game.shock = Math.min(18, game.shock + 5 * power);
    game.flash = Math.max(game.flash, 0.1 * power);
    game.flashColor = color;
  }

  function showFloatingText(x, y, text, color, scale = 1) {
    game.particles.push({
      text, x, y, vx: (Math.random() - 0.5) * 1.1, vy: -1.2 - Math.random() * 0.8,
      life: 1, color, size: 18 * scale, textMode: true
    });
  }

  function addScore(base, x, y, color) {
    const waveMulti = 1 + (game.wave - 1) * 0.16;
    const comboMulti = 1 + Math.min(30, game.combo) * 0.22;
    const feverMulti = game.energy >= 100 ? 3 : 1;
    const surgeBonus = Math.pow(Math.max(1, game.combo + 1), 1.2) * 70;
    const gain = Math.round(base * waveMulti * comboMulti * feverMulti + surgeBonus);
    game.score += gain;
    showFloatingText(x, y, `+${gain.toLocaleString()}`, color, 1 + Math.min(1.7, game.combo * 0.05));
    return gain;
  }

  function triggerHitStop(dur) {
    game.hitStopTimer = Math.max(game.hitStopTimer, dur);
  }
  function triggerZoomPunch(strength) {
    game.zoomPunch = Math.max(game.zoomPunch, strength);
  }

  function triggerQuantumDecay(x, y, sourceId = '') {
    const visited = new Set(sourceId ? [sourceId] : []);
    let chain = 0;
    for (let i = game.enemies.length - 1; i >= 0; i--) {
      const e = game.enemies[i];
      if (!e || visited.has(e.id)) continue;
      if (Math.hypot(e.x - x, e.y - y) <= 82) {
        visited.add(e.id);
        e.hitFlash = 1;
        e.scaleJolt = 1.15;
        spawnExplosion(e.x, e.y, e.color, 14, 0.7);
        spawnLightBurst(e.x, e.y, e.color, 2);
        showFloatingText(e.x, e.y, 'CHAIN', '#ffffff', 0.75);
        addScore(Math.round(e.scoreBase * 0.3), e.x, e.y, '#ffffff');
        game.combo += 1;
        game.comboTimer = Math.max(game.comboTimer, 1.2);
        game.energy = Math.min(MAX_ENERGY, game.energy + 1);
        game.enemies.splice(i, 1);
        chain++;
        if (chain >= 6) break;
      }
    }
    if (chain >= 2) {
      showToast('QUANTUM DECAY', '#ffffff');
      triggerHitStop(0.04);
      triggerZoomPunch(0.018);
    }
  }


  function createEnemy(lane = null, yOffset = null, forcedKind = null) {
    const tierRoll = Math.random();
    let kind = forcedKind || 'round';
    let size = 18, speed = 95 + game.wave * 6, hp = 1, scoreBase = 1300;
    if (!forcedKind) {
      if (tierRoll > 0.9) kind = 'brute';
      else if (tierRoll > 0.65) kind = Math.random() > 0.5 ? 'star' : 'saucer';
      else kind = Math.random() > 0.5 ? 'round' : 'diamond';
    }
    if (kind === 'brute') { size = 30 + Math.random() * 10; speed = 70 + game.wave * 4; hp = 3; scoreBase = 7000; }
    else if (kind === 'star' || kind === 'saucer') { size = 22 + Math.random() * 8; speed = 108 + game.wave * 7; hp = 2; scoreBase = 2800; }

    const colorIndex = Math.random() > 0.5 ? 0 : 1;
    const laneIndex = lane == null ? Math.floor(Math.random() * LANES) : Math.max(0, Math.min(LANES - 1, lane));
    const x = laneX(laneIndex) + (Math.random() - 0.5) * 16;
    return {
      x,
      y: yOffset == null ? -60 - size - Math.random() * 120 : yOffset,
      laneIndex,
      id: Math.random().toString(36).slice(2),
      colorIndex, color: COLORS[colorIndex],
      hp, maxHp: hp, size, kind, speed,
      wobble: Math.random() * Math.PI * 2, spin: (Math.random() - 0.5) * 1.2, rot: Math.random() * Math.PI * 2,
      scoreBase, sway: kind === 'saucer' ? 28 : kind === 'star' ? 18 : 10, fallAccel: 1 + Math.random() * 0.25,
      hitFlash: 0, scaleJolt: 1,
    };
  }

  function spawnWaveChunk() {
    if (game.boss || game.waveEnemiesLeft <= 0) return;
    const formation = Math.random();
    if (formation < 0.25) {
      const center = 1 + Math.floor(Math.random() * 3);
      const y = -60 - Math.random() * 60;
      for (let i = center - 1; i <= center + 1; i++) {
        game.enemies.push(createEnemy(i, y - Math.random() * 10, Math.random() > 0.65 ? 'diamond' : 'round'));
      }
      game.waveEnemiesLeft = Math.max(0, game.waveEnemiesLeft - 3);
    } else if (formation < 0.33) {
      const lane = Math.floor(Math.random() * LANES);
      game.enemies.push(createEnemy(lane, -80, 'brute'));
      game.waveEnemiesLeft = Math.max(0, game.waveEnemiesLeft - 2);
    } else {
      game.enemies.push(createEnemy());
      game.waveEnemiesLeft = Math.max(0, game.waveEnemiesLeft - 1);
    }
  }

  function spawnEnemyBullet(x, y, angle, spd, colorIndex, size = 9, bounce = false) {
    game.enemyBullets.push({
      x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
      colorIndex, color: COLORS[colorIndex], size, life: 1, bounce
    });
  }

  function lineCircleHit(x1, y1, x2, y2, cx, cy, cr) {
    const dx = x2 - x1, dy = y2 - y1;
    const len2 = dx * dx + dy * dy;
    if (len2 <= 0.0001) return Math.hypot(cx - x1, cy - y1) <= cr;
    let t = ((cx - x1) * dx + (cy - y1) * dy) / len2;
    t = Math.max(0, Math.min(1, t));
    const px = x1 + dx * t;
    const py = y1 + dy * t;
    return Math.hypot(cx - px, cy - py) <= cr;
  }

  function spawnBoss() {
    const typeIndex = (game.wave - 1) % BOSS_TYPES.length;
    const bossType = BOSS_TYPES[typeIndex];
    const hpBase = 38 + game.wave * 12;
    game.boss = {
      x: w / 2, y: -80, targetY: 90,
      hp: hpBase, maxHp: hpBase,
      type: bossType, colorIndex: 0, size: 56, dir: 1,
      speed: 80 + game.wave * 4, rot: 0, hitFlash: 0, scaleJolt: 1,
      phase: 0, stateTimer: 0.9, chargeTimer: 0, laserActive: 0, laserAngle: 0,
      phaseShiftTimer: 1.2, arrived: false,
      interruptHp: 0, stunTimer: 0,
    };
    game.boss.interruptHp = bossType === 'LASER' ? 8 + game.wave : 0;
    game.bossType = bossType;
    game.bossWarning = 2.5;
    game.flash = 0.5;
    game.flashColor = '#ff2244';
    game.shock = 16;
    triggerHitStop(0.08);
    triggerZoomPunch(0.04);
    showToast(`⚠ ${bossType.replace('_', ' ')} ⚠`, '#ff2244');
    playSound(80, 'sawtooth', 0.45, 0.08, 0.3);
    playSound(160, 'square', 0.28, 0.04, 0.4);
  }

  function killBoss() {
    const boss = game.boss;
    if (!boss) return;
    const bonus = 60000 + game.wave * 25000;
    game.score += bonus;
    spawnExplosion(boss.x, boss.y, '#ffea00', 90, 2.8);
    spawnLightBurst(boss.x, boss.y, '#ffea00', 16);
    triggerHitStop(0.18);
    triggerZoomPunch(0.07);
    showToast('BOSS DEFEATED!!', '#ffea00');
    showFloatingText(boss.x, boss.y, `+${bonus.toLocaleString()}`, '#ffea00', 2.2);
    playKillSound(true, true, game.combo);
    game.boss = null;
    game.combo += 12;
    game.comboTimer = 3.5;
    game.energy = MAX_ENERGY;
    game.wave += 1;
    game.waveEnemiesLeft = 12 + game.wave * 3;
    game.waveBossCleared = false;
    game.enemies = [];
    game.enemyBullets = [];
    const praise = PRAISE_POOL[Math.floor(Math.random() * PRAISE_POOL.length)];
    showFloatingText(game.baseX, h * 0.32, praise, '#ffea00', 1.6);
  }

  function updateBoss(dt) {
    const boss = game.boss;
    if (!boss) return;
    boss.rot += dt * 0.9;
    boss.hitFlash = Math.max(0, boss.hitFlash - dt * 4);
    if (boss.scaleJolt > 1) boss.scaleJolt = 1 + (boss.scaleJolt - 1) * 0.72;

    if (!boss.arrived) {
      boss.y += (boss.targetY - boss.y) * Math.min(1, dt * 4.5);
      if (Math.abs(boss.y - boss.targetY) < 2) { boss.y = boss.targetY; boss.arrived = true; }
      return;
    }

    if (boss.stunTimer > 0) {
      boss.stunTimer -= dt;
      boss.rot += dt * 2.2;
      if (Math.sin(game.time * 24) > 0) boss.hitFlash = 1;
      return;
    }

    switch (boss.type) {
      case 'SPREADER': {
        boss.x += boss.dir * boss.speed * dt;
        if (boss.x > w - boss.size - 20) { boss.x = w - boss.size - 20; boss.dir = -1; }
        if (boss.x < boss.size + 20) { boss.x = boss.size + 20; boss.dir = 1; }
        boss.stateTimer -= dt;
        if (boss.stateTimer <= 0) {
          const n = 5;
          const baseAng = Math.PI / 2;
          for (let i = 0; i < n; i++) {
            const ang = baseAng + (i - (n - 1) / 2) * 0.32;
            spawnEnemyBullet(boss.x, boss.y + boss.size * 0.5, ang, 5.5, boss.colorIndex, 11);
          }
          boss.colorIndex = 1 - boss.colorIndex;
          boss.stateTimer = Math.max(0.8, 1.8 - game.wave * 0.06);
          playSound(260, 'sawtooth', 0.1, 0.035, 0.4);
        }
        break;
      }
      case 'LASER': {
        boss.x += boss.dir * boss.speed * 0.6 * dt;
        if (boss.x > w - boss.size - 20) { boss.x = w - boss.size - 20; boss.dir = -1; }
        if (boss.x < boss.size + 20) { boss.x = boss.size + 20; boss.dir = 1; }
        boss.stateTimer -= dt;
        if (boss.phase === 0 && boss.stateTimer <= 0) {
          boss.laserAngle = Math.atan2(game.baseY - boss.y, game.baseX - boss.x);
          boss.phase = 1;
          boss.chargeTimer = 1.1;
          playSound(400, 'triangle', 0.12, 0.035, 1.2);
        }
        if (boss.phase === 1) {
          boss.chargeTimer -= dt;
          if (boss.chargeTimer <= 0) {
            boss.phase = 2;
            boss.laserActive = 0.55;
            game.flash = Math.max(game.flash, 0.22);
            game.flashColor = '#ff2244';
            playSound(180, 'sawtooth', 0.55, 0.06, 0.3);
          }
        }
        if (boss.phase === 2) {
          boss.laserActive -= dt;
          const lx2 = boss.x + Math.cos(boss.laserAngle) * 1200;
          const ly2 = boss.y + Math.sin(boss.laserAngle) * 1200;
          if (lineCircleHit(boss.x, boss.y, lx2, ly2, game.baseX, game.baseY, game.centerRadius + 14)) {
            game.lives -= 1;
            game.combo = 0;
            game.energy = Math.max(0, game.energy - 15);
            game.flash = Math.max(game.flash, 0.35);
            game.flashColor = '#ff445e';
            spawnExplosion(game.baseX, game.baseY, '#ff445e', 28, 1.1);
            showToast('レーザーヒット', '#ff445e');
            playSound(95, 'square', 0.22, 0.06, 0.4);
            if (game.lives <= 0) { gameOver(); return; }
            boss.laserActive = 0;
          }
          if (boss.laserActive <= 0) {
            boss.phase = 0;
            boss.stateTimer = Math.max(1.2, 2.8 - game.wave * 0.08);
          }
        }
        break;
      }
      case 'SWARM_QUEEN': {
        boss.x += boss.dir * boss.speed * 0.55 * dt;
        if (boss.x > w - boss.size - 20) { boss.x = w - boss.size - 20; boss.dir = -1; }
        if (boss.x < boss.size + 20) { boss.x = boss.size + 20; boss.dir = 1; }
        boss.stateTimer -= dt;
        if (boss.stateTimer <= 0) {
          const n = 2 + Math.floor(Math.random() * 2);
          for (let i = 0; i < n; i++) {
            const lane = Math.floor(Math.random() * LANES);
            game.enemies.push(createEnemy(lane, boss.y + boss.size + 10 + i * 20, Math.random() > 0.5 ? 'round' : 'diamond'));
          }
          boss.stateTimer = Math.max(1.5, 3.0 - game.wave * 0.1);
          showFloatingText(boss.x, boss.y + boss.size + 10, '子分召喚!', '#ff2244', 0.85);
          playSound(320, 'square', 0.1, 0.04, 0.5);
          game.flash = Math.max(game.flash, 0.08);
          game.flashColor = '#ff2244';
        }
        break;
      }
      case 'BOUNCER': {
        boss.x += boss.dir * boss.speed * 0.9 * dt;
        if (boss.x > w - boss.size - 20) { boss.x = w - boss.size - 20; boss.dir = -1; }
        if (boss.x < boss.size + 20) { boss.x = boss.size + 20; boss.dir = 1; }
        boss.stateTimer -= dt;
        if (boss.stateTimer <= 0) {
          for (const ang of [Math.PI / 2 - 0.55, Math.PI / 2 + 0.55]) {
            spawnEnemyBullet(boss.x, boss.y + boss.size * 0.5, ang, 6, boss.colorIndex, 10, true);
          }
          boss.stateTimer = Math.max(0.6, 1.4 - game.wave * 0.05);
          playSound(300, 'triangle', 0.08, 0.04, 0.45);
        }
        break;
      }
      case 'PHASE_SHIFT': {
        boss.x += boss.dir * boss.speed * 0.7 * dt;
        if (boss.x > w - boss.size - 20) { boss.x = w - boss.size - 20; boss.dir = -1; }
        if (boss.x < boss.size + 20) { boss.x = boss.size + 20; boss.dir = 1; }
        boss.phaseShiftTimer -= dt;
        if (boss.phaseShiftTimer <= 0) {
          boss.colorIndex = 1 - boss.colorIndex;
          boss.phaseShiftTimer = Math.max(1.0, 2.2 - game.wave * 0.07);
          game.flash = Math.max(game.flash, 0.14);
          game.flashColor = COLORS[boss.colorIndex];
          showFloatingText(boss.x, boss.y + boss.size + 8, boss.colorIndex === 0 ? '青に変化' : 'ピンクに変化', COLORS[boss.colorIndex], 0.8);
          playSound(boss.colorIndex === 0 ? 740 : 520, 'triangle', 0.15, 0.05, 0.8);
          const n = 8;
          for (let i = 0; i < n; i++) {
            const ang = (Math.PI * 2 / n) * i;
            spawnEnemyBullet(boss.x, boss.y, ang, 4.5, boss.colorIndex, 9);
          }
        }
        boss.stateTimer -= dt;
        if (boss.stateTimer <= 0) {
          for (const off of [-0.22, 0, 0.22]) {
            spawnEnemyBullet(boss.x, boss.y + boss.size * 0.5, Math.PI / 2 + off, 5, boss.colorIndex, 9);
          }
          boss.stateTimer = Math.max(0.9, 1.8 - game.wave * 0.06);
          playSound(240, 'sawtooth', 0.08, 0.03, 0.4);
        }
        break;
      }
    }

    for (let j = game.bullets.length - 1; j >= 0; j--) {
      const b = game.bullets[j];
      if (Math.hypot(b.x - boss.x, b.y - boss.y) < boss.size + b.size * 0.8) {
        game.bullets.splice(j, 1);
        if (b.colorIndex === boss.colorIndex) {
          boss.hp -= b.power;
          boss.hitFlash = 1;
          boss.scaleJolt = 1.14;
          spawnExplosion(b.x, b.y, b.color, 6, 0.4);
          playSound(480, 'triangle', 0.04, 0.03, 0.75);
          if ((boss.type === 'LASER') && (boss.phase === 1 || boss.phase === 2)) {
            boss.interruptHp -= b.power;
            showFloatingText(boss.x, boss.y - boss.size - 10, '迎撃', '#ffea00', 0.75);
            if (boss.interruptHp <= 0) {
              boss.phase = 0;
              boss.chargeTimer = 0;
              boss.laserActive = 0;
              boss.stateTimer = 1.15;
              boss.stunTimer = 0.9;
              boss.interruptHp = 8 + game.wave;
              game.flash = Math.max(game.flash, 0.22);
              game.flashColor = '#ffea00';
              spawnLightBurst(boss.x, boss.y, '#ffea00', 8);
              triggerHitStop(0.08);
              showToast('LASER BREAK!!', '#ffea00');
              addScore(2200, boss.x, boss.y, '#ffea00');
              game.energy = Math.min(MAX_ENERGY, game.energy + 10);
            }
          }
          if (boss.hp <= 0) {
            killBoss();
            return;
          }
        } else {
          showFloatingText(boss.x, boss.y, 'REFLECT!', '#fff', 0.8);
          playSound(300, 'square', 0.05, 0.02, 0.3);
          spawnExplosion(b.x, b.y, '#ffffff', 5, 0.3);
        }
      }
    }
  }

  function updateEnemyBullets(dt) {
    for (let i = game.enemyBullets.length - 1; i >= 0; i--) {
      const b = game.enemyBullets[i];
      b.x += b.vx;
      b.y += b.vy;
      b.life -= dt * 0.3;
      if (b.bounce) {
        if (b.x < b.size) { b.x = b.size; b.vx = Math.abs(b.vx); }
        if (b.x > w - b.size) { b.x = w - b.size; b.vx = -Math.abs(b.vx); }
      }
      if (b.y > h + 40 || b.life <= 0 || b.x < -60 || b.x > w + 60) {
        game.enemyBullets.splice(i, 1);
        continue;
      }

      let erased = false;
      for (let j = game.bullets.length - 1; j >= 0; j--) {
        const pb = game.bullets[j];
        if (Math.hypot(pb.x - b.x, pb.y - b.y) < pb.size + b.size + 2) {
          game.bullets.splice(j, 1);
          game.enemyBullets.splice(i, 1);
          erased = true;
          const goodColor = pb.colorIndex === b.colorIndex;
          spawnExplosion(b.x, b.y, goodColor ? pb.color : '#ffffff', goodColor ? 10 : 6, goodColor ? 0.65 : 0.4);
          if (goodColor) {
            game.combo += 0.35;
            game.comboTimer = Math.max(game.comboTimer, 1.0);
            game.energy = Math.min(MAX_ENERGY, game.energy + 1.5);
            addScore(260, b.x, b.y, '#ffea00');
            showFloatingText(b.x, b.y, '迎撃!', '#ffea00', 0.8);
            playSound(520, 'triangle', 0.04, 0.025, 0.8);
          } else {
            showFloatingText(b.x, b.y, '相殺', '#ffffff', 0.7);
            playSound(260, 'square', 0.03, 0.02, 0.7);
          }
          break;
        }
      }
      if (erased) continue;

      if (Math.hypot(b.x - game.baseX, b.y - game.baseY) < game.centerRadius + b.size) {
        game.enemyBullets.splice(i, 1);
        spawnExplosion(game.baseX, game.baseY, b.color, 18, 0.7);
        game.combo = 0;
        game.energy = Math.max(0, game.energy - 10);
        game.lives -= 1;
        game.flash = Math.max(game.flash, 0.3);
        game.flashColor = '#ff445e';
        showToast('いたい', '#ff445e');
        playSound(95, 'square', 0.2, 0.06, 0.4);
        if (game.lives <= 0) { gameOver(); return; }
      }
    }
  }

  function fireBullet(power = 1) {
    const barrel = 52;
    const spd = 17 + power * 1.8;
    game.recoil = Math.min(1, game.recoil + 0.42 + power * 0.08);
    const spread = (Math.random() - 0.5) * (game.energy >= 100 ? 0.08 : 0.03);
    const angle = game.pAngle + spread;
    const bx = game.baseX + Math.cos(angle) * barrel;
    const by = game.baseY + Math.sin(angle) * barrel;
    game.bullets.push({
      x: bx, y: by, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
      colorIndex: game.phase, color: COLORS[game.phase], size: 8 + power, life: 1,
      power, trail: [{ x: bx, y: by }]
    });
    for (let i = 0; i < 5; i++) {
      const a = angle + (Math.random() - 0.5) * 0.4;
      const s = 1.5 + Math.random() * 2.5;
      game.particles.push({ x: bx, y: by, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0.5, color: COLORS[game.phase], size: Math.random() * 5 + 2, rot: 0, spin: 0 });
    }
    playSound(game.phase === 0 ? 540 : 420, 'triangle', 0.06, 0.03 + Math.min(0.03, power * 0.01), 0.6);
  }

  function firePulse() {
    if (game.energy < 100 || game.pulseCooldown > 0) return;
    game.energy = 0;
    game.pulseCooldown = 0.7;
    game.feverFlash = 1.0;
    game.flash = 0.6;
    game.flashColor = '#ffffff';
    game.shock = 22;
    triggerHitStop(0.12);
    triggerZoomPunch(0.045);
    playFeverSound();

    let hitCount = 0;
    let bulletClear = 0;
    for (let i = game.enemyBullets.length - 1; i >= 0; i--) {
      const eb = game.enemyBullets[i];
      const dist = Math.hypot(eb.x - game.baseX, eb.y - game.baseY);
      if (dist < Math.min(w, h) * 0.78) {
        bulletClear++;
        spawnExplosion(eb.x, eb.y, eb.color, 10, 0.55);
        game.enemyBullets.splice(i, 1);
      }
    }
    if (game.boss && game.boss.type === 'LASER' && (game.boss.phase === 1 || game.boss.phase === 2)) {
      game.boss.phase = 0;
      game.boss.chargeTimer = 0;
      game.boss.laserActive = 0;
      game.boss.stateTimer = 1.2;
      game.boss.stunTimer = 0.8;
      game.boss.interruptHp = 8 + game.wave;
      showToast('OVERDRIVE BREAK!!', '#ffea00');
      spawnLightBurst(game.boss.x, game.boss.y, '#ffea00', 10);
    }
    for (let i = game.enemies.length - 1; i >= 0; i--) {
      const e = game.enemies[i];
      const dist = Math.hypot(e.x - game.baseX, e.y - game.baseY);
      if (dist < Math.min(w, h) * 0.72) {
        if (e.colorIndex === game.phase) {
          hitCount++;
          addScore(e.scoreBase * 3, e.x, e.y, '#ffea00');
          spawnExplosion(e.x, e.y, '#ffea00', 40, 1.6);
          spawnLightBurst(e.x, e.y, '#ffea00', 5);
          game.enemies.splice(i, 1);
        } else {
          e.hp = Math.max(1, e.hp - 1);
          e.hitFlash = 1;
          e.scaleJolt = 1.2;
          spawnExplosion(e.x, e.y, '#ffffff', 10, 0.5);
          showFloatingText(e.x, e.y, 'けずる', '#ffffff', 0.75);
        }
      }
    }
    if (game.boss) {
      const boss = game.boss;
      const dist = Math.hypot(boss.x - game.baseX, boss.y - game.baseY);
      if (dist < Math.min(w, h) * 0.72) {
        if (boss.colorIndex === game.phase) {
          hitCount += 4;
          boss.hp -= 8;
          boss.hitFlash = 1;
          boss.scaleJolt = 1.18;
          spawnExplosion(boss.x, boss.y, '#ffea00', 28, 1.3);
          spawnLightBurst(boss.x, boss.y, '#ffea00', 8);
          if (boss.hp <= 0) killBoss();
        } else {
          showFloatingText(boss.x, boss.y, 'REFLECT!', '#ffffff', 0.9);
        }
      }
    }
    if (bulletClear > 0) {
      addScore(bulletClear * 180, game.baseX, game.baseY - 90, '#ffea00');
      showFloatingText(game.baseX, game.baseY - 56, `迎撃 ${bulletClear}`, '#ffea00', 0.95);
    }
    if (hitCount > 0) {
      game.combo += hitCount;
      game.comboTimer = 2.2;
      showToast(hitCount >= 10 ? 'MEGA ドカン!!' : 'ドカン!!', '#ffea00');
    } else {
      showToast('空ドカン', '#ffffff');
      playSound(200, 'triangle', 0.15, 0.04, 0.5);
    }
  }

  function pickTarget() {
    let target = null;
    let best = Infinity;
    const candidates = game.boss ? [game.boss, ...game.enemies] : game.enemies;
    if (!candidates.length) return null;
    for (const e of candidates) {
      const laneWeight = Math.abs(e.x - game.baseX) * 1.05;
      const dangerWeight = (h - e.y) * -0.5;
      const d = Math.abs(e.x - game.baseX) + Math.abs(e.y - game.baseY) * 0.4 + laneWeight + dangerWeight;
      if (d < best) { best = d; target = e; }
    }
    return target;
  }

  function gameOver() {
    cancelPointer();
    game.state = 'gameOver';
    saveHighScore();
    titleScreen.style.display = 'flex';
    mainTitle.innerHTML = game.newRecord ? 'NEW<br>RECORD' : 'SYSTEM<br>FAILURE';
    subTitle.textContent = `SCORE ${game.score.toLocaleString()}　BEST ${highScore.toLocaleString()}`;
    leadText.innerHTML = `WAVE ${game.wave} まで到達。<br>もう一度、派手にやり直す。`;
    startBtn.textContent = 'RETRY';
    playSound(70, 'sawtooth', 0.9, 0.08, 0.3);
  }

  function updateHud() {
    scoreEl.textContent = game.score.toLocaleString();
    const newRank = calcRank(game.combo);
    if (newRank !== game.rank) {
      game.rank = newRank;
      game.rankTimer = 1;
    }
    comboEl.textContent = `${Math.max(0, Math.floor(game.combo))}  [${game.rank}]`;
    waveText.textContent = game.boss
      ? `WAVE ${game.wave} ★BOSS★`
      : `WAVE ${game.wave}　残${Math.max(0, game.waveEnemiesLeft + game.enemies.length)}`;
    feverText.textContent = game.energy >= 100 ? '★ FEVER MAX ★' : `FEVER ${Math.floor(game.energy)}%`;
    energyBar.style.width = `${Math.max(0, Math.min(100, game.energy))}%`;
    energyBar.style.filter = game.energy >= 100 ? 'brightness(1.6) saturate(2)' : 'none';
  }

  function update(dt) {
    if (game.newRecordFreeze > 0) {
      game.newRecordFreeze -= dt;
      if (game.flash > 0.01) game.flash *= 0.92; else game.flash = 0;
      if (game.feverFlash > 0.01) game.feverFlash *= 0.92; else game.feverFlash = 0;
      if (game.newRecordFlash > 0.01) game.newRecordFlash *= 0.95; else game.newRecordFlash = 0;
      updateHud();
      return;
    }
    if (game.hitStopTimer > 0) {
      game.hitStopTimer -= dt;
      if (game.flash > 0.01) game.flash *= 0.85; else game.flash = 0;
      if (game.feverFlash > 0.01) game.feverFlash *= 0.88; else game.feverFlash = 0;
      if (game.newRecordFlash > 0.01) game.newRecordFlash *= 0.95; else game.newRecordFlash = 0;
      return;
    }

    game.time += dt;
    if (game.zoomPunch > 0.0005) { game.zoomPunch *= 0.82; game.screenZoom = 1 + game.zoomPunch; }
    else { game.zoomPunch = 0; game.screenZoom = 1; }

    if (game.energy >= 100 && !game.feverActivated) {
      game.feverActivated = true;
      game.feverFlash = 0.9;
      triggerHitStop(0.08);
      triggerZoomPunch(0.03);
    } else if (game.energy < 100) {
      game.feverActivated = false;
    }

    const target = pickTarget();
    if (target) {
      const targetAngle = Math.atan2(target.y - game.baseY, target.x - game.baseX);
      let diff = targetAngle - game.pAngle;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      game.pAngle += diff * Math.min(1, dt * (game.pointerDown ? 10.5 : 5.2));
    } else {
      const diff = -Math.PI / 2 - game.pAngle;
      game.pAngle += diff * Math.min(1, dt * 4);
    }

    if (game.pulseCooldown > 0) game.pulseCooldown = Math.max(0, game.pulseCooldown - dt);

    const spawnRate = Math.max(0.24, 1.02 - game.wave * 0.06);
    game.spawnTimer -= dt;
    if (game.spawnTimer <= 0 && !game.boss && game.waveEnemiesLeft > 0) {
      spawnWaveChunk();
      game.spawnTimer = spawnRate * (0.55 + Math.random() * 0.9);
    }
    if (!game.boss && game.waveEnemiesLeft <= 0 && game.enemies.length === 0 && BOSS_WAVES) {
      spawnBoss();
    }
    if (game.bossWarning > 0) game.bossWarning -= dt;

    if (game.pointerDown || game.fireTouchActive) {
      if (!game.holdArmed) {
        game.autoFire -= dt;
        if (game.autoFire <= 0) {
          game.holdArmed = true;
          game.autoFire = 0;
        }
      }
      if (game.holdArmed) {
        game.autoFire -= dt;
        const comboBoost = Math.min(0.028, Math.floor(game.combo / 10) * 0.004);
        const fireGap = game.energy >= 100 ? 0.04 : Math.max(0.048, game.fireInterval - comboBoost);
        if (game.autoFire <= 0) {
          const burst = game.energy >= 100 ? 2 : 1;
          for (let k = 0; k < burst; k++) fireBullet(game.energy >= 100 ? 2 : 1);
          game.autoFire = fireGap;
        }
      }
    }



    for (let i = game.bullets.length - 1; i >= 0; i--) {
      const b = game.bullets[i];
      b.trail.push({ x: b.x, y: b.y });
      if (b.trail.length > 8) b.trail.shift();
      b.x += b.vx; b.y += b.vy; b.life -= dt * 0.95;
      if (b.x < -60 || b.x > w + 60 || b.y < -60 || b.y > h + 60 || b.life <= 0) game.bullets.splice(i, 1);
    }

    for (const e of game.enemies) {
      if (e.hitFlash > 0) e.hitFlash *= 0.78;
      if (e.scaleJolt > 1) e.scaleJolt = 1 + (e.scaleJolt - 1) * 0.7;
    }

    for (let i = game.enemies.length - 1; i >= 0; i--) {
      const e = game.enemies[i];
      e.wobble += dt * (2 + e.size * 0.01);
      const targetX = laneX(e.laneIndex) + Math.sin(e.wobble) * e.sway;
      const dx = targetX - e.x;
      e.x += dx * Math.min(1, dt * 2.2);
      e.y += e.speed * dt * e.fallAccel;
      e.rot += e.spin * dt;
      const dist = Math.hypot(e.x - game.baseX, e.y - game.baseY);
      if (dist < game.centerRadius + e.size * 0.55 || e.y > game.baseY + 26) {
        game.enemies.splice(i, 1);
        spawnExplosion(game.baseX, game.baseY, '#ff445e', 32, 1.2);
        showToast('いたい', '#ff445e');
        game.combo = 0;
        game.energy = Math.max(0, game.energy - 18);
        game.lives -= 1;
        game.flash = Math.max(game.flash, 0.28);
        game.flashColor = '#ff445e';
        playSound(95, 'square', 0.22, 0.06, 0.4);
        if (game.lives <= 0) { gameOver(); return; }
      }
    }

    updateBoss(dt);
    if (game.state !== 'play') return;
    updateEnemyBullets(dt);
    if (game.state !== 'play') return;

    for (let i = game.enemies.length - 1; i >= 0; i--) {
      const e = game.enemies[i];
      for (let j = game.bullets.length - 1; j >= 0; j--) {
        const b = game.bullets[j];
        const hitR = e.size * 0.8 + b.size;
        if (Math.hypot(b.x - e.x, b.y - e.y) < hitR) {
          game.bullets.splice(j, 1);
          if (b.colorIndex === e.colorIndex) {
            e.hp -= b.power;
            e.hitFlash = 1;
            e.scaleJolt = 1.22;
            spawnExplosion(b.x, b.y, b.color, 8, 0.55);
            if (e.hp <= 0) {
              const giant = e.kind === 'brute';
              const deadX = e.x;
              const deadY = e.y;
              const deadId = e.id;
              spawnExplosion(deadX, deadY, e.color, giant ? 52 : 26, giant ? 1.8 : 1.1);
              spawnLightBurst(deadX, deadY, e.color, giant ? 8 : 4);
              triggerHitStop(giant ? 0.07 : 0.03);
              triggerZoomPunch(giant ? 0.03 : 0.012);
              game.enemies.splice(i, 1);
              game.combo += giant ? 3 : 1;
              game.comboTimer = 2.2;
              addScore(e.scoreBase, deadX, deadY, e.color);
              const energyGain = giant ? 20 : Math.min(18, 9 + game.combo * 0.05);
              game.energy = Math.min(MAX_ENERGY, game.energy + energyGain);
              if (!game.boss && !giant) triggerQuantumDecay(deadX, deadY, deadId);
              if (game.combo > 0 && game.combo % 10 === 0) {
                showToast(`${game.combo} COMBO!!`, '#ffea00');
                const bonus = game.wave * 6000;
                game.score += bonus;
                showFloatingText(e.x, e.y - 24, `+${bonus.toLocaleString()}`, '#ffea00', 1.2);
                spawnLightBurst(e.x, e.y, '#ffea00', 10);
                triggerHitStop(0.06);
                triggerZoomPunch(0.028);
                const praise = PRAISE_POOL[Math.floor(Math.random() * PRAISE_POOL.length)];
                showFloatingText(e.x, e.y - 48, praise, '#b8ff00', 0.9);
              }
              if (game.combo > 0 && game.combo % 100 === 0) {
                showToast(`${game.combo} COMBO!!`, '#ffea00');
                game.shock = Math.max(game.shock, 34);
                triggerHitStop(0.08);
                triggerZoomPunch(0.04);
                playSound(1200, 'sine', 0.35, 0.12, 0.88);
                spawnLightBurst(deadX, deadY, '#ffea00', 16);
              }
              playKillSound(false, giant, game.combo);
            } else {
              showFloatingText(e.x, e.y, 'GOOD', e.color, 0.8);
              playSound(380, 'triangle', 0.05, 0.03, 0.75);
            }
          } else {
            game.combo = Math.max(0, game.combo - 3);
            showFloatingText(e.x, e.y, '色ちがい！', '#ff4444', 0.85);
            game.flash = Math.max(game.flash, 0.1);
            game.flashColor = '#ff4444';
            playSound(180, 'sawtooth', 0.06, 0.03, 0.35);
          }
          break;
        }
      }
    }

    if (game.combo > 0) {
      game.comboTimer -= dt;
      if (game.comboTimer < 0) game.combo = Math.max(0, game.combo - dt * 4);
    }

    if (game.particles.length > 150) {
      game.particles.splice(0, game.particles.length - 150);
    }

    for (let i = game.particles.length - 1; i >= 0; i--) {
      const p = game.particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life *= p.textMode ? 0.97 : 0.94;
      const friction = p.friction || 0.985;
      p.vx *= friction;
      p.vy = p.textMode ? p.vy : p.vy * friction + 0.03;
      if (!p.textMode) p.rot += p.spin || 0;
      if (p.life < 0.05) game.particles.splice(i, 1);
    }

    for (let i = game.lightBursts.length - 1; i >= 0; i--) {
      const lb = game.lightBursts[i];
      lb.len += lb.speed * dt;
      lb.life -= dt * 2.2;
      if (lb.life <= 0 || lb.len > lb.maxLen) game.lightBursts.splice(i, 1);
    }

    if (game.rankTimer > 0) {
      game.rankTimer -= dt;
      if (game.rankTimer <= 0 && game.rank !== 'D') {
        showToast(`RANK ${game.rank}!!`, game.rank === 'SS' ? '#ffea00' : game.rank === 'S' ? '#b8ff00' : '#00ffff');
        game.rankTimer = 0;
      }
    }

    game.vignette = Math.min(1, game.combo / 60);
    saveHighScore();

    game.recoil *= Math.max(0, 1 - dt * 12);
    if (game.shock > 0.02) game.shock *= 0.88; else game.shock = 0;
    if (game.flash > 0.01) game.flash *= 0.9; else game.flash = 0;
    if (game.feverFlash > 0.01) game.feverFlash *= 0.88; else game.feverFlash = 0;
    if (game.newRecordFlash > 0.01) game.newRecordFlash *= 0.95; else game.newRecordFlash = 0;
    if (game.toast > 0.01) {
      game.toast *= 0.95;
      toastEl.style.opacity = String(game.toast);
      toastEl.style.transform = `translateX(-50%) translateY(${-30 * (1 - game.toast)}px) scale(${0.92 + game.toast * 0.18})`;
    } else {
      game.toast = 0;
      toastEl.style.opacity = '0';
    }

    updateHud();
  }

  function drawEnemy(e) {
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.rotate(e.rot);
    if (e.scaleJolt > 1.001) ctx.scale(e.scaleJolt, 2 - e.scaleJolt);
    ctx.shadowBlur = e.hitFlash > 0.1 ? 48 : 24;
    ctx.shadowColor = e.hitFlash > 0.1 ? '#ffffff' : e.color;
    ctx.fillStyle = e.hitFlash > 0.1 ? '#ffffff' : e.color;
    switch (e.kind) {
      case 'diamond':
        ctx.beginPath();
        ctx.moveTo(0, -e.size);
        ctx.lineTo(e.size * 0.85, 0);
        ctx.lineTo(0, e.size);
        ctx.lineTo(-e.size * 0.85, 0);
        ctx.closePath();
        ctx.fill();
        break;
      case 'star': {
        const spikes = 5;
        ctx.beginPath();
        for (let i = 0; i < spikes * 2; i++) {
          const r = i % 2 === 0 ? e.size : e.size * 0.42;
          const a = (Math.PI / spikes) * i - Math.PI / 2;
          const px = Math.cos(a) * r;
          const py = Math.sin(a) * r;
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
        break;
      }
      case 'saucer':
        ctx.beginPath();
        ctx.ellipse(0, 0, e.size * 1.15, e.size * 0.56, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,.35)';
        ctx.beginPath();
        ctx.ellipse(0, -e.size * 0.18, e.size * 0.48, e.size * 0.25, 0, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'brute':
        roundRectPath(ctx, -e.size, -e.size, e.size * 2, e.size * 2, e.size * 0.28);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,.16)';
        ctx.fillRect(-e.size * 0.72, -e.size * 0.15, e.size * 1.44, e.size * 0.3);
        break;
      default:
        ctx.beginPath();
        ctx.arc(0, 0, e.size, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.fillStyle = '#000';
    const eye = Math.max(2, e.size * 0.12);
    ctx.beginPath();
    ctx.arc(-e.size * 0.26, -e.size * 0.08, eye, 0, Math.PI * 2);
    ctx.arc(e.size * 0.26, -e.size * 0.08, eye, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-e.size * 0.2, -e.size * 0.13, eye * 0.35, 0, Math.PI * 2);
    ctx.arc(e.size * 0.32, -e.size * 0.13, eye * 0.35, 0, Math.PI * 2);
    ctx.fill();
    if (e.maxHp > 1) {
      ctx.strokeStyle = 'rgba(255,255,255,.25)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(0, 0, e.size + 8, -Math.PI / 2, -Math.PI / 2 + (Math.PI * 2) * (e.hp / e.maxHp));
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawBoss(boss) {
    ctx.save();
    ctx.translate(boss.x, boss.y);
    ctx.rotate(boss.rot);
    if (boss.scaleJolt > 1.001) ctx.scale(boss.scaleJolt, 2 - boss.scaleJolt);

    const isFlash = boss.hitFlash > 0.1;
    ctx.shadowBlur = isFlash ? 70 : 42;
    ctx.shadowColor = isFlash ? '#ffffff' : '#ff2244';

    ctx.save();
    ctx.rotate(-boss.rot * 1.8);
    ctx.strokeStyle = isFlash ? '#ffffff' : COLORS[boss.colorIndex];
    ctx.lineWidth = 4;
    ctx.globalAlpha = 0.45;
    ctx.beginPath();
    ctx.arc(0, 0, boss.size + 14, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();

    ctx.fillStyle = isFlash ? '#ffffff' : '#cc1133';
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI / 3) * i;
      const px = Math.cos(a) * boss.size;
      const py = Math.sin(a) * boss.size;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = isFlash ? '#ffea00' : COLORS[boss.colorIndex];
    ctx.shadowColor = COLORS[boss.colorIndex];
    ctx.beginPath();
    ctx.arc(0, 0, boss.size * 0.3, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.fillStyle = '#000';
    const eye = boss.size * 0.09;
    ctx.beginPath();
    ctx.arc(-boss.size * 0.2, -boss.size * 0.06, eye, 0, Math.PI * 2);
    ctx.arc(boss.size * 0.2, -boss.size * 0.06, eye, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    const bpw = Math.min(w * 0.68, 440);
    const bpx = (w - bpw) / 2;
    const bpy = boss.y + boss.size + 14;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    roundRectPath(ctx, bpx, bpy, bpw, 11, 5);
    ctx.fill();
    const hpRatio = boss.hp / boss.maxHp;
    ctx.fillStyle = hpRatio > 0.5 ? '#ff2244' : hpRatio > 0.25 ? '#ff7700' : '#ffea00';
    ctx.shadowBlur = 14;
    ctx.shadowColor = ctx.fillStyle;
    roundRectPath(ctx, bpx, bpy, bpw * hpRatio, 11, 5);
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.font = '700 13px Orbitron, sans-serif';
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.72;
    ctx.textAlign = 'center';
    ctx.fillText(boss.type.replace('_', ' '), w / 2, bpy + 24);
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';

    if (boss.type === 'LASER' && boss.phase === 1) {
      ctx.save();
      ctx.globalAlpha = 0.35 + Math.sin(game.time * 14) * 0.2;
      ctx.strokeStyle = '#ff2244';
      ctx.lineWidth = 3;
      ctx.setLineDash([12, 8]);
      ctx.shadowBlur = 18;
      ctx.shadowColor = '#ff2244';
      ctx.beginPath();
      ctx.moveTo(boss.x, boss.y);
      ctx.lineTo(boss.x + Math.cos(boss.laserAngle) * 1200, boss.y + Math.sin(boss.laserAngle) * 1200);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
    if (boss.type === 'LASER' && boss.phase === 2 && boss.laserActive > 0) {
      ctx.save();
      ctx.globalAlpha = Math.min(1, boss.laserActive * 3);
      ctx.strokeStyle = '#ff2244';
      ctx.lineWidth = 10 + Math.sin(game.time * 30) * 4;
      ctx.shadowBlur = 40;
      ctx.shadowColor = '#ff6688';
      ctx.beginPath();
      ctx.moveTo(boss.x, boss.y);
      ctx.lineTo(boss.x + Math.cos(boss.laserAngle) * 1200, boss.y + Math.sin(boss.laserAngle) * 1200);
      ctx.stroke();
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#ffffff';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.moveTo(boss.x, boss.y);
      ctx.lineTo(boss.x + Math.cos(boss.laserAngle) * 1200, boss.y + Math.sin(boss.laserAngle) * 1200);
      ctx.stroke();
      ctx.restore();
    }
    if (game.bossWarning > 0) {
      const sz = Math.round(Math.min(w * 0.09, 54));
      ctx.save();
      ctx.globalAlpha = game.bossWarning * 0.85;
      ctx.font = `900 ${sz}px Orbitron, sans-serif`;
      ctx.fillStyle = '#ff2244';
      ctx.shadowBlur = 30;
      ctx.shadowColor = '#ff2244';
      ctx.textAlign = 'center';
      ctx.fillText('⚠ BOSS ⚠', w / 2, h * 0.5);
      ctx.restore();
      ctx.textAlign = 'left';
    }
  }

  function draw() {
    const abyss = game.score >= 1000000;
    const bgAlpha = game.energy >= 100 ? 0.36 : Math.max(0.1, 0.22 - game.energy / 1400);
    ctx.fillStyle = abyss ? `rgba(0,5,16,${Math.min(0.28, bgAlpha + 0.03)})` : `rgba(2,0,8,${bgAlpha})`;
    ctx.fillRect(0, 0, w, h);

    const zoom = game.screenZoom || 1;
    ctx.save();
    if (zoom !== 1) {
      ctx.translate(w / 2, h / 2);
      ctx.scale(zoom, zoom);
      ctx.translate(-w / 2, -h / 2);
    }
    ctx.save();
    ctx.translate((Math.random() - 0.5) * game.shock, (Math.random() - 0.5) * game.shock);

    const starColor = game.energy >= 100 ? '#ffea00' : (abyss ? '#8fd6ff' : '#fff');
    for (const s of game.stars) {
      s.y += s.z * (1.2 + game.wave * 0.12);
      if (s.y > h + 10) { s.y = -10; s.x = Math.random() * w; }
      ctx.globalAlpha = 0.4 + s.z * 0.4;
      ctx.fillStyle = starColor;
      ctx.fillRect(s.x, s.y, s.r, s.r * (1 + s.z));
    }
    ctx.globalAlpha = 1;

    for (const lb of game.lightBursts) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, lb.life * 0.55);
      ctx.strokeStyle = lb.color;
      ctx.lineWidth = lb.width;
      ctx.shadowBlur = 18;
      ctx.shadowColor = lb.color;
      ctx.beginPath();
      ctx.moveTo(lb.x, lb.y);
      ctx.lineTo(lb.x + Math.cos(lb.angle) * lb.len, lb.y + Math.sin(lb.angle) * lb.len);
      ctx.stroke();
      ctx.restore();
    }

    if (game.energy >= 100 || game.feverFlash > 0.05) {
      const glowAlpha = game.feverFlash > 0.05 ? game.feverFlash * 0.18 : 0.04 + Math.sin(game.time * 8) * 0.02;
      ctx.fillStyle = `rgba(255,220,0,${glowAlpha})`;
      ctx.fillRect(0, 0, w, h);
    }

    if (abyss && Math.random() < 0.012) {
      ctx.save();
      ctx.globalAlpha = 0.06 + Math.random() * 0.04;
      ctx.fillStyle = 'rgba(130,220,255,1)';
      const gy = Math.random() * h;
      ctx.fillRect(0, gy, w, 2 + Math.random() * 6);
      ctx.restore();
    }

    const pulse = Math.sin(game.time * 6) * 0.06 + 1;
    const baseGrad = ctx.createRadialGradient(game.baseX, game.baseY, 10, game.baseX, game.baseY, 96);
    baseGrad.addColorStop(0, game.phase === 0 ? 'rgba(0,255,255,0.95)' : 'rgba(255,0,255,0.95)');
    baseGrad.addColorStop(0.38, game.phase === 0 ? 'rgba(0,255,255,0.24)' : 'rgba(255,0,255,0.24)');
    baseGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = baseGrad;
    ctx.beginPath();
    ctx.arc(game.baseX, game.baseY, 96 * pulse, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.16)';
    roundRectPath(ctx, game.baseX - 86, game.baseY + 18, 172, 18, 10);
    ctx.fill();

    ctx.save();
    ctx.translate(game.baseX, game.baseY);
    ctx.rotate(game.pAngle);
    ctx.fillStyle = '#ffffff';
    ctx.shadowBlur = 30;
    ctx.shadowColor = COLORS[game.phase];
    roundRectPath(ctx, -14, -18, 28, 36, 10);
    ctx.fill();
    ctx.save();
    ctx.translate(-game.recoil * 9, 0);
    ctx.fillStyle = COLORS[game.phase];
    roundRectPath(ctx, 16, -8, 50, 16, 8);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,.9)';
    roundRectPath(ctx, 52, -5, 12, 10, 4);
    ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, 0, 11, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,.22)';
    roundRectPath(ctx, -30, 12, 60, 18, 9);
    ctx.fill();
    ctx.restore();

    for (const b of game.bullets) {
      if (b.trail && b.trail.length > 1) {
        for (let t = 0; t < b.trail.length - 1; t++) {
          const alpha = (t / b.trail.length) * 0.5;
          const width = b.size * 0.7 * (t / b.trail.length);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.strokeStyle = b.color;
          ctx.shadowBlur = 8;
          ctx.shadowColor = b.color;
          ctx.lineWidth = width;
          ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(b.trail[t].x, b.trail[t].y);
          ctx.lineTo(b.trail[t + 1].x, b.trail[t + 1].y);
          ctx.stroke();
          ctx.restore();
        }
      }
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(Math.atan2(b.vy, b.vx));
      ctx.shadowBlur = 15;
      ctx.shadowColor = b.color;
      ctx.fillStyle = b.color;
      roundRectPath(ctx, -b.size * 0.3, -b.size * 0.5, b.size * 1.8, b.size, 5);
      ctx.fill();
      ctx.restore();
    }

    for (const e of game.enemies) drawEnemy(e);

    for (const b of game.enemyBullets) {
      ctx.save();
      ctx.globalAlpha = Math.min(1, b.life * 2);
      ctx.shadowBlur = 22;
      ctx.shadowColor = b.color;
      ctx.fillStyle = b.color;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.65)';
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.size * 0.38, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    if (game.boss) drawBoss(game.boss);

    for (const p of game.particles) {
      ctx.globalAlpha = Math.max(0, p.life);
      if (p.textMode) {
        ctx.font = `900 ${p.size}px Orbitron, sans-serif`;
        ctx.fillStyle = p.color;
        ctx.shadowBlur = 16;
        ctx.shadowColor = p.color;
        ctx.fillText(p.text, p.x, p.y);
      } else {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot || 0);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size * 0.5, -p.size * 0.5, p.size, p.size);
        ctx.restore();
      }
    }
    ctx.globalAlpha = 1;
    ctx.restore();
    ctx.restore();

    if (game.flash > 0) {
      ctx.fillStyle = game.flashColor ? hexToRgba(game.flashColor, game.flash * 0.72) : `rgba(255,255,255,${game.flash})`;
      ctx.fillRect(0, 0, w, h);
    }
    if (game.feverFlash > 0.05) {
      ctx.fillStyle = `rgba(255,240,80,${game.feverFlash * 0.35})`;
      ctx.fillRect(0, 0, w, h);
    }

    if (game.newRecordFlash > 0.05 || game.newRecordFreeze > 0) {
      const alpha = Math.max(game.newRecordFlash * 0.55, game.newRecordFreeze > 0 ? 0.18 : 0);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fillRect(0, 0, w, h);
      ctx.save();
      ctx.globalAlpha = Math.max(0.35, game.newRecordFlash);
      ctx.textAlign = 'center';
      ctx.font = `900 ${Math.round(Math.min(w * 0.11, 58))}px Orbitron, sans-serif`;
      ctx.fillStyle = '#ffffff';
      ctx.shadowBlur = 30;
      ctx.shadowColor = '#ffffff';
      ctx.fillText('NEW RECORD', w / 2, h * 0.48);
      ctx.restore();
      ctx.textAlign = 'left';
    }

    const lifeY = h - 26 - getViewportOffset();
    for (let i = 0; i < game.lives; i++) {
      ctx.fillStyle = '#ff445e';
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#ff445e';
      ctx.beginPath();
      ctx.arc(22 + i * 22, lifeY, 7, 0, Math.PI * 2);
      ctx.fill();
    }

    if (game.vignette > 0.05) {
      const vig = ctx.createRadialGradient(w / 2, h / 2, Math.min(w, h) * 0.28, w / 2, h / 2, Math.max(w, h) * 0.82);
      const col = game.rank === 'SS' ? '255,220,0' : game.rank === 'S' ? '180,255,0' : '0,255,255';
      vig.addColorStop(0, `rgba(${col},0)`);
      vig.addColorStop(1, `rgba(${col},${(game.vignette * 0.34).toFixed(3)})`);
      ctx.fillStyle = vig;
      ctx.fillRect(0, 0, w, h);
    }

    ctx.shadowBlur = 0;
  }

  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;
    if (game.state === 'play') update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function handleTap(now) {
    if (now - game.lastTapAt <= 320) {
      firePulse();
      game.lastTapAt = 0;
    } else {
      game.lastTapAt = now;
    }
  }

  function startFireInput() {
    game.pointerDown = true;
    game.fireTouchActive = true;
    game.holdArmed = false;
    game.autoFire = game.holdDelay;
  }

  function stopFireInput() {
    game.pointerDown = false;
    game.fireTouchActive = false;
    game.holdArmed = false;
    game.autoFire = 0;
    game.activePointerId = null;
    game.fireTouchId = null;
  }

  function onPointerDown(e) {
    if (game.state !== 'play') return;
    if (e.pointerType === 'touch') return;
    startFireInput();
    game.activePointerId = e.pointerId;
    canvas.setPointerCapture?.(e.pointerId);
  }

  function onPointerUp(e) {
    if (game.state !== 'play') return;
    if (e.pointerType === 'touch') return;
    if (game.activePointerId !== null && e.pointerId !== game.activePointerId) return;
    const wasHold = game.holdArmed;
    stopFireInput();
    if (!wasHold) handleTap(performance.now());
    try { canvas.releasePointerCapture?.(e.pointerId); } catch (_) {}
  }

  function onPointerCancel(e) {
    if (e.pointerType === 'touch') return;
    if (game.activePointerId !== null && e.pointerId !== game.activePointerId) return;
    stopFireInput();
    game.lastTapAt = 0;
    try { canvas.releasePointerCapture?.(e.pointerId); } catch (_) {}
  }

  function onTouchStart(e) {
    if (game.state !== 'play') return;
    if (game.fireTouchId !== null) return;
    const t = e.changedTouches[0];
    if (!t) return;
    e.preventDefault();
    game.fireTouchId = t.identifier;
    startFireInput();
  }

  function onTouchEnd(e) {
    if (game.state !== 'play') return;
    const ended = Array.from(e.changedTouches).some(t => t.identifier === game.fireTouchId);
    if (!ended) return;
    e.preventDefault();
    const wasHold = game.holdArmed;
    stopFireInput();
    if (!wasHold) handleTap(performance.now());
  }

  function onTouchCancel(e) {
    const ended = Array.from(e.changedTouches).some(t => t.identifier === game.fireTouchId);
    if (!ended) return;
    stopFireInput();
    game.lastTapAt = 0;
  }

  function cancelPointer() {
    if (!game) return;
    stopFireInput();
    game.lastTapAt = 0;
  }

  canvas.addEventListener('pointerdown', onPointerDown, { passive: false });
  canvas.addEventListener('pointerup', onPointerUp, { passive: false });
  canvas.addEventListener('pointercancel', onPointerCancel, { passive: false });
  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  window.addEventListener('touchend', onTouchEnd, { passive: false });
  window.addEventListener('touchcancel', onTouchCancel, { passive: false });
  canvas.addEventListener('lostpointercapture', cancelPointer);
  canvas.addEventListener('contextmenu', (e) => e.preventDefault());
  window.addEventListener('blur', cancelPointer);
  document.addEventListener('visibilitychange', () => { if (document.hidden) cancelPointer(); });

  function wireColorButton(btn, phase) {
    const handler = (e) => {
      e.preventDefault();
      e.stopPropagation();
      setPhase(phase);
    };
    btn.addEventListener('pointerdown', handler, { passive: false });
    btn.addEventListener('touchstart', handler, { passive: false });
    btn.addEventListener('mousedown', handler, { passive: false });
    btn.addEventListener('click', handler);
  }
  wireColorButton(blueBtn, 0);
  wireColorButton(pinkBtn, 1);

  document.addEventListener('gesturestart', (e) => e.preventDefault(), { passive: false });
  document.addEventListener('selectstart', (e) => e.preventDefault());
  window.addEventListener('touchmove', (e) => {
    if (game && game.state === 'play' && (game.pointerDown || game.fireTouchActive)) e.preventDefault();
  }, { passive: false });

  startBtn.addEventListener('click', () => {
    getAudioCtx();
    resetGame();
  });

  game = makeGame();
  resize();
  initStars();
  updateBasePosition();
  updatePhaseText();
  updateHud();
  subTitle.textContent = `BEST ${highScore.toLocaleString()}`;
  requestAnimationFrame(loop);
})();

</script>
</body>
</html>
